name: Android CI

on:
  workflow_dispatch: # MANTRA INI YANG MEMUNCULKAN TOMBOL RUN WORKFLOW!

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle

    - name: Cari Folder Android dan Masak APK
      run: |
        FOLDER=$(dirname $(find . -name "gradlew" | head -n 1))
        cd "$FOLDER"
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Hidangkan APK untuk di-download
      uses: actions/upload-artifact@v4
      with:
        name: Aplikasi-KameRobot
        path: '**/*.apk'
